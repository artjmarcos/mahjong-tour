    <style>

<body>
<div class="app-container" id="appRoot"></div>
<div id="ad-banner" style="display:none;"></div>
<div id="victoryModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(8px)">
    <div class="w-4/5 max-w-sm p-6 rounded-3xl border border-primary/30 text-center" style="background:linear-gradient(145deg,rgba(23,34,30,0.9),rgba(11,21,18,0.95))">
        <div class="text-6xl mb-2" id="victoryIcon">🏆</div>
        <h2 class="text-2xl font-bold text-primary text-glow">¡Nivel Completado!</h2>
        <p class="text-white/80 mt-1" id="victoryName"></p>
        <div class="text-3xl my-4" id="starsDisplay"></div>
        <button onclick="UI.closeVictory()" class="w-full py-3 mt-2 rounded-xl btn-primary text-lg">VOLVER</button>
    </div>
</div>
<div id="rewardModal" style="display:none" class="reward-modal">
    <span class="text-xs text-white/30 uppercase tracking-widest mb-4">📺 Video Recompensado</span>
    <div class="reward-video-placeholder"><div class="text-center"><span class="text-4xl block mb-2">🎬</span><span>AdMob · Rewarded Video</span></div></div>
    <p class="text-white/70 text-sm mb-3" id="rewardText">Mira el video para ganar tu recompensa</p>
    <div class="flex gap-3"><button onclick="UI.closeRewardModal()" class="px-6 py-2 rounded-xl bg-white/10 text-white/50 text-sm">Cancelar</button><button onclick="UI.simulateRewardedVideo()" class="px-6 py-2 rounded-xl btn-reward text-sm font-bold">🎁 Ver Video</button></div>
</div>

<script>
// ========== SDK DE PUBLICIDAD GPT (IDs de prueba) ==========
window.googletag = window.googletag || { cmd: [] };
const ADMOB_CONFIG = { banner: '/6499/example/banner', rewarded: '/6499/example/rewarded', interstitial: '/6499/example/interstitial' };
let bannerSlot, rewardedSlot, interstitialSlot;
googletag.cmd.push(() => {
    googletag.pubads().enableSingleRequest();
    googletag.enableServices();
    bannerSlot = googletag.defineSlot(ADMOB_CONFIG.banner, [[320, 50], [300, 50]], 'ad-banner').addService(googletag.pubads());
    rewardedSlot = googletag.defineOutOfPageSlot(ADMOB_CONFIG.rewarded).addService(googletag.pubads());
    interstitialSlot = googletag.defineOutOfPageSlot(ADMOB_CONFIG.interstitial).addService(googletag.pubads());
});

// ========== NÚCLEO PROTEGIDO (GameEngine) – PAREJAS GARANTIZADAS ==========
const GameEngine = (function() {
    let tiles = [], slots = [], score = 0, combo = 1;
    let selectedTileIdx = null;
    const MAX_SLOTS = 4;
    let currentLevelConfig = null;
    let difficulty = 'normal';
    let timerInterval = null, timeLeft = -1;
    let hintUses = 3, shuffleUses = 3, undoUses = 3;
    let onStateChange = null;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playTone(freq, duration, type='sine', vol=0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration);
    }
    const sound = {
        select: () => playTone(600, 0.1, 'sine', 0.15),
        match: () => { playTone(523,0.15); setTimeout(()=>playTone(659,0.15),100); setTimeout(()=>playTone(784,0.2),200); },
        error: () => playTone(200, 0.2, 'square', 0.08),
        victory: () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.25),i*150)),
        shuffle: () => playTone(440, 0.2, 'triangle', 0.15),
        hint: () => playTone(660, 0.15, 'sine', 0.2),
    };

    function isTileFree(tile, activeTiles) {
        const { col, row, layer } = tile;
        const above = activeTiles.find(t => t.layer === layer + 1 && Math.abs(t.col - col) <= 1 && Math.abs(t.row - row) <= 1);
        if (above) return false;
        const left = activeTiles.find(t => t.layer === layer && t.row === row && t.col === col - 1);
        const right = activeTiles.find(t => t.layer === layer && t.row === row && t.col === col + 1);
        return !(left && right);
    }
    function updateBlocked() {
        const active = tiles.filter(t => !t.matched && !t.inSlot);
        tiles.forEach(t => { if (t.matched || t.inSlot) { t.blocked = false; return; } t.blocked = !isTileFree(t, active); });
    }
    function shouldBeFaceDown(levelNum) {
        if (difficulty === 'facil') return false;
        if (difficulty === 'dificil') return levelNum >= 4 ? Math.random() < 0.6 : false;
        return levelNum >= 6 ? Math.random() < 0.5 : false;
    }

    function createTiles(zonePhotos, traditionalTilesList) {
        let attempts = 0;
        const maxAttempts = 10;
        while (attempts < maxAttempts) {
            tiles = [];
            let totalPairs = Math.max(1, Math.floor(currentLevelConfig.pairs));
            const pairItems = [];
            let maxPhotos = (currentLevelConfig.num <= 3) ? Math.min(4, zonePhotos.length) : zonePhotos.length;
            const usedPhotos = [...zonePhotos].sort(() => Math.random() - 0.5).slice(0, maxPhotos);
            for (let i = 0; i < Math.min(totalPairs, usedPhotos.length); i++) {
                pairItems.push({ ...usedPhotos[i], type: 'photo' });
            }
            let tradIdx = 0;
            while (pairItems.length < totalPairs) {
                pairItems.push({ ...traditionalTilesList[tradIdx % traditionalTilesList.length], type: 'ceramic' });
                tradIdx++;
            }
            pairItems.forEach((item, pid) => {
                const fd = shouldBeFaceDown(currentLevelConfig.num), bonus = difficulty === 'dificil' && Math.random() < 0.2;
                tiles.push({ ...item, pid, matched: false, blocked: false, inSlot: false, col: 0, row: 0, layer: 0, faceDown: fd, revealed: !fd, bonus });
                tiles.push({ ...item, pid, matched: false, blocked: false, inSlot: false, col: 0, row: 0, layer: 0, faceDown: fd, revealed: !fd, bonus });
            });
            const count = {}; tiles.forEach(t => { count[t.pid] = (count[t.pid] || 0) + 1; });
            const allPairsOk = Object.values(count).every(c => c === 2);
            if (allPairsOk && tiles.length % 2 === 0) break;
            attempts++;
            console.warn(`⚠️ Intento ${attempts}: pares incorrectos, regenerando nivel...`);
        }
        if (attempts >= maxAttempts) console.error('❌ No se pudo generar un nivel válido.');
        for (let i = tiles.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [tiles[i], tiles[j]] = [tiles[j], tiles[i]]; }
        const totalTiles = tiles.length, colsBase = 6, rowsBase = Math.ceil(totalTiles * 0.7 / colsBase);
        const tilesLayer0 = Math.min(totalTiles, colsBase * rowsBase), tilesLayer1 = totalTiles - tilesLayer0, colsLayer1 = 4, offsetCol = Math.floor((colsBase - colsLayer1) / 2);
        let idx = 0;
        for (let i = 0; i < tilesLayer0; i++) { tiles[idx].col = i % colsBase; tiles[idx].row = Math.floor(i / colsBase); tiles[idx].layer = 0; idx++; }
        for (let i = 0; i < tilesLayer1; i++) { tiles[idx].col = offsetCol + (i % colsLayer1); tiles[idx].row = Math.floor(i / colsLayer1); tiles[idx].layer = 1; idx++; }
        updateBlocked();
    }

    function checkForMatchInSlots() {
        if (slots.length < 2) return;
        for (let i = 0; i < slots.length; i++) {
            for (let j = i + 1; j < slots.length; j++) {
                if (slots[i].pid === slots[j].pid && slots[i].idx !== slots[j].idx) {
                    const a = slots[i], b = slots[j]; sound.match();
                    const idxA = a.idx, idxB = b.idx;
                    if (idxA > idxB) { tiles.splice(idxA, 1); tiles.splice(idxB, 1); } else { tiles.splice(idxB, 1); tiles.splice(idxA, 1); }
                    const removed = [idxA, idxB].sort((x, y) => x - y);
                    slots.forEach(slot => { if (slot.idx > removed[0]) slot.idx--; if (slot.idx > removed[1]) slot.idx--; });
                    if (i > j) { slots.splice(i, 1); slots.splice(j, 1); } else { slots.splice(j, 1); slots.splice(i, 1); }
                    selectedTileIdx = slots.length > 0 ? slots[slots.length - 1].idx : null;
                    const multiplier = (a.bonus && b.bonus) ? 2 : 1; score += (100 + combo * 50) * multiplier; combo++;
                    if (timeLeft > 0) { timeLeft += 3; if (timeLeft > 99) timeLeft = 99; }
                    updateBlocked();
                    if (onStateChange) onStateChange('match', { a, b });
                    if (tiles.filter(t => !t.matched && !t.inSlot).length === 0) { if (timerInterval) clearInterval(timerInterval); if (onStateChange) onStateChange('victory', { score, combo }); }
                    return;
                }
            }
        }
        if (slots.length >= MAX_SLOTS) { sound.error(); if (onStateChange) onStateChange('slotsfull'); }
    }

    function startTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { timeLeft--; if (onStateChange) onStateChange('timer', { timeLeft }); if (timeLeft <= 0) { clearInterval(timerInterval); if (onStateChange) onStateChange('timeout'); } }, 1000); }

    return Object.freeze({
        init(config, zonePhotos, traditionalTilesList) {
            initAudio(); currentLevelConfig = config; difficulty = config.difficulty || 'normal';
            slots = []; score = 0; combo = 1; selectedTileIdx = null;
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = (difficulty === 'dificil') ? config.pairs * 6 : -1;
            hintUses = config.hintUses || 3; shuffleUses = config.shuffleUses || 3; undoUses = config.undoUses || 3;
            createTiles(zonePhotos, traditionalTilesList);
            if (timeLeft > 0) startTimer();
        },
        getTiles() { return tiles; }, getSlots() { return slots; }, getScore() { return score; }, getCombo() { return combo; },
        getSelectedTileIdx() { return selectedTileIdx; }, getTimeLeft() { return timeLeft; }, getDifficulty() { return difficulty; },
        getPowerUps() { return { hintUses, shuffleUses, undoUses }; },
        addPowerUp(type, amount = 1) { if (type === 'hint') hintUses += amount; else if (type === 'shuffle') shuffleUses += amount; else if (type === 'undo') undoUses += amount; },
        onTileClick(index) {
            const t = tiles[index]; if (!t || t.matched || t.blocked || t.inSlot) return false;
            if (slots.length >= MAX_SLOTS) return false; if (t.faceDown && !t.revealed) t.revealed = true;
            sound.select(); t.inSlot = true; slots.push({ ...t, idx: index }); selectedTileIdx = index;
            updateBlocked(); checkForMatchInSlots(); if (onStateChange) onStateChange('boardChanged'); return true;
        },
        useShuffle() { if (shuffleUses <= 0) return false; shuffleUses--; sound.shuffle(); tiles.forEach(t => { t.col = Math.floor(Math.random() * 6); t.row = Math.floor(Math.random() * Math.ceil(tiles.length / 6)); }); slots = []; selectedTileIdx = null; updateBlocked(); if (onStateChange) onStateChange('boardChanged'); return true; },
        useHint() { if (hintUses <= 0) return false; hintUses--; sound.hint(); const f = tiles.filter(t => !t.matched && !t.inSlot); for (let i = 0; i < f.length; i++) { for (let j = i + 1; j < f.length; j++) { if (f[i].pid === f[j].pid) { if (onStateChange) onStateChange('hint', { name: f[i].name || 'Fichas iguales' }); return true; } } } if (onStateChange) onStateChange('hint', { name: 'Mezcla el tablero' }); return true; },
        undoLastSelection() { if (slots.length === 0) return false; sound.select(); const last = slots.pop(); tiles[last.idx].inSlot = false; selectedTileIdx = slots.length > 0 ? slots[slots.length - 1].idx : null; updateBlocked(); if (onStateChange) onStateChange('boardChanged'); return true; },
        setOnStateChange(callback) { onStateChange = callback; }, isGameOver() { return tiles.filter(t => !t.matched && !t.inSlot).length === 0; },
        stopTimer() { if (timerInterval) clearInterval(timerInterval); }, getLevelConfig() { return currentLevelConfig; }
    });
})();

        const originalLevel = currentZone.levels.find(l => l.num === n); currentLevel = { ...originalLevel, zoneId: currentZone.id };

    function startGameWithDifficulty(difficulty) {
        let pairs = currentLevel.pairs, hintUses = 3, shuffleUses = 3, undoUses = 3;

        else if (difficulty === 'dificil') { pairs = pairs + 2; hintUses = 1; shuffleUses = 1; undoUses = 1; }
        const config = { ...currentLevel, pairs, difficulty, hintUses, shuffleUses, undoUses }; tutorialActive = false; startGame(config);
    }

    function startGame(config) {
        hideBannerAd(); GameEngine.init(config, currentZone.photos, traditionalTiles); const timeLeft = GameEngine.getTimeLeft();
        const slotsHTML = `<div class="w-14 h-20 rounded-lg slot-empty" id="slot-0">+</div><div class="w-14 h-20 rounded-lg slot-empty" id="slot-1">+</div><div class="w-14 h-20 rounded-lg slot-empty" id="slot-2">+</div><div class="w-14 h-20 rounded-lg slot-empty" id="slot-3">+</div>`;
        document.getElementById('appRoot').innerHTML = `<div class="h-full flex flex-col bg-surface p-3"><div class="flex items-center justify-between mb-2"><button onclick="UI.goBackFromGame()" class="material-symbols-outlined text-white">arrow_back</button><span class="text-primary font-bold" id="pairsLeft">${config.pairs} pares</span>${timeLeft > 0 ? `<span class="text-white font-bold" id="timerDisplay">⏱ ${timeLeft}s</span>` : ''}</div><div class="flex gap-1 mb-2 justify-center" id="slotsContainer">${slotsHTML}</div><div class="relative flex-1 bg-black/20 rounded-xl overflow-hidden border border-white/5" id="boardContainer" style="display:flex;align-items:center;justify-content:center;min-height:300px;perspective:800px;"></div>${tutorialActive ? '' : `<div class="flex justify-center gap-4 mt-3"><div class="power-up-btn" onclick="UI.useHint()" title="💡 Pista">💡<span class="power-up-badge" id="hintBadge">${GameEngine.getPowerUps().hintUses}</span></div><div class="power-up-btn" onclick="UI.useShuffle()" title="🔀 Mezclar">🔀<span class="power-up-badge" id="shuffleBadge">${GameEngine.getPowerUps().shuffleUses}</span></div><div class="power-up-btn" onclick="UI.undoLastSelection()" title="↩️ Deshacer">↩️<span class="power-up-badge" id="undoBadge">${GameEngine.getPowerUps().undoUses}</span></div></div>`}<div class="text-center mt-2 h-4"><span id="message" class="text-xs text-primary/80"></span></div></div>`;
        renderBoard(); if (tutorialActive) showTutorialOverlay();
    }

    function startTutorial(zoneId) { tutorialActive = true; tutorialStep = 0; tutorialZoneId = zoneId; const zone = ZONES.find(z => z.id === zoneId); currentZone = zone; currentLevel = { ...zone.levels[0], pairs: 4, zoneId }; startGame({ ...currentLevel, difficulty: 'facil', hintUses: 99, shuffleUses: 99, undoUses: 99 }); }

    function updateTutorialMessage() { const msg = document.getElementById('tutorialMessage'); if (!msg) return; const steps = ['👋 ¡Bienvenido! Elimina todos los pares de fichas.','🖱️ Toca una ficha para seleccionarla.','🔍 Ahora toca su pareja idéntica.','✅ ¡Perfecto! Sigue encontrando pares.','🔒 Las fichas bloqueadas (oscuras) no pueden seleccionarse.','🏁 Completa todos los pares para ganar.']; msg.innerHTML = `<p class="text-sm leading-relaxed">${steps[Math.min(tutorialStep, steps.length - 1)]}</p><div class="mt-4 flex gap-2 justify-center">${tutorialStep > 0 ? '<button onclick="UI.prevTutorialStep()" class="px-3 py-1 rounded-lg bg-white/10 text-white/70 text-xs">←</button>' : ''}<button onclick="UI.advanceTutorial()" class="px-4 py-1 rounded-lg btn-primary text-xs">${tutorialStep >= steps.length - 1 ? 'Empezar' : 'Siguiente →'}</button></div><button onclick="UI.skipTutorial()" class="mt-2 text-xs text-white/40 underline">Saltar tutorial</button>`; }

    // ====== MEMORICE CON 6 FOTOS ======
    function startMemoriceMinigame(zoneId, levelNum) {
        const mini = MINIGAMES[`${zoneId}-${levelNum}`]; if (!mini || !mini.photos) return;
        const shuffled = [...mini.photos].sort(() => Math.random() - 0.5); memoricePhotos = shuffled.slice(0, 6);
        memoriceCards = []; memoricePhotos.forEach((photo, idx) => { memoriceCards.push({ ...photo, pairId: idx }); memoriceCards.push({ ...photo, pairId: idx }); });
        for (let i = memoriceCards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [memoriceCards[i], memoriceCards[j]] = [memoriceCards[j], memoriceCards[i]]; }
        memoriceFlipped = []; memoriceMatched = 0; memoriceLocked = false;
        if (!document.getElementById('memoriceModal')) {
            const modal = document.createElement('div'); modal.id = 'memoriceModal'; modal.className = 'memorice-modal';
            modal.innerHTML = `<div class="w-full max-w-sm rounded-2xl border border-primary/30 p-4" style="background:linear-gradient(145deg,rgba(23,34,30,0.95),rgba(11,21,18,0.95))"><div class="flex items-center justify-between mb-4"><span class="text-primary font-bold text-lg" id="memoriceTitle">Memorice</span><button onclick="UI.closeMemorice()" class="text-white/50 hover:text-white text-xl">✕</button></div><div class="memorice-board" id="memoriceBoard"></div></div>`;
            document.body.appendChild(modal);
        }
        document.getElementById('memoriceModal').style.display = 'flex'; document.getElementById('memoriceTitle').textContent = mini.icon + ' ' + mini.name;
        renderMemoriceBoard();
    }

    function renderMemoriceBoard() {
        const board = document.getElementById('memoriceBoard'); if (!board) return; board.innerHTML = '';
        memoriceCards.forEach((card, index) => {
            const el = document.createElement('div'); el.className = 'memorice-card';
            if (memoriceFlipped.includes(index) || card.matched) { el.classList.add('flipped'); el.innerHTML = `<img src="${card.url}" alt="${card.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-white/30\'>?</span>'">`; }
            else { el.innerHTML = '<span class="card-back">🪭</span>'; }
            if (card.matched) { el.classList.add('matched'); }
            el.onclick = () => flipMemoriceCard(index); board.appendChild(el);
        });
    }

    function flipMemoriceCard(index) {
        if (memoriceLocked) return; if (memoriceFlipped.includes(index)) return; if (memoriceCards[index].matched) return;
        memoriceFlipped.push(index); renderMemoriceBoard();
        if (memoriceFlipped.length === 2) { memoriceLocked = true; const [a, b] = memoriceFlipped;
            if (memoriceCards[a].pairId === memoriceCards[b].pairId) { memoriceCards[a].matched = true; memoriceCards[b].matched = true; memoriceMatched++; memoriceFlipped = []; memoriceLocked = false; renderMemoriceBoard(); if (memoriceMatched === 6) { setTimeout(() => { addCoins(10); document.getElementById('memoriceModal').style.display = 'none'; showMessage('🎉 ¡Memorice completado! +10 monedas'); }, 500); } }
            else { setTimeout(() => { memoriceFlipped = []; memoriceLocked = false; renderMemoriceBoard(); }, 800); }
        }
    }

    function showWorldMain() {
        const ts = ZONES.reduce((s, z) => s + z.levels.reduce((ss, l) => ss + getStars(z.id, l.num), 0), 0);
        const cpChile = Math.round((getTotalStarsForCountry('chile') / 120) * 100), cpArgentina = Math.round((getTotalStarsForCountry('argentina') / 120) * 100), cpMexico = Math.round((getTotalStarsForCountry('mexico') / 120) * 100);
        document.getElementById('appRoot').innerHTML = `<div class="h-full flex flex-col bg-surface overflow-y-auto" style="padding-bottom:70px"><div class="relative h-48 overflow-hidden"><img src="https://drive.google.com/thumbnail?id=1hsx1UaDia9i7oOLdeslGtGLwl0tqUP71&sz=w800" class="absolute inset-0 w-full h-full object-cover opacity-30" onerror="this.style.display='none'"/><div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface"></div><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-4xl mb-2">🌎</span><h1 class="text-2xl font-bold text-primary text-glow tracking-widest">WORLD TOUR</h1><div class="bg-primary/10 px-3 py-1 rounded-full mt-2"><span class="text-primary text-sm font-bold">⭐ ${ts} estrellas</span></div></div></div><div class="p-4 space-y-3">${countryCard('🇨🇱','Chile',cpChile,'UI.showChileZones()')}${countryCard('🇦🇷','Argentina',cpArgentina,'UI.showArgentineZones()')}${countryCard('🇲🇽','México',cpMexico,'UI.showMexicanZones()')}<div class="relative rounded-2xl overflow-hidden border border-dashed border-white/20 opacity-60" style="background:rgba(255,255,255,0.02)"><div class="p-4 flex items-center gap-4"><span class="text-4xl grayscale">🇧🇷</span><div class="flex-1"><h3 class="font-bold text-white/70 text-lg">Brasil</h3><p class="text-xs text-primary/50">8 regiones · 80 niveles</p><p class="text-xs text-white/40 mt-1">🛠️ Próximamente</p></div><span class="text-white/20 text-2xl">🔜</span></div></div></div><div class="px-4 pb-4 space-y-2"><button onclick="UI.showAlbum()" class="w-full py-3 rounded-xl bg-white/5 border border-white/10 text-white font-bold flex items-center justify-center gap-2"><span class="material-symbols-outlined">photo_album</span>ÁLBUM DE VIAJES</button><button onclick="UI.showTienda()" class="w-full py-3 rounded-xl bg-white/5 border border-white/10 text-white font-bold flex items-center justify-center gap-2"><span class="material-symbols-outlined">storefront</span>TIENDA</button></div></div>`;
        showBannerAd();
    }

    function countryCard(flag, name, progress, onclick) { return `<div onclick="${onclick}" class="relative rounded-2xl overflow-hidden border-2 border-primary/30" style="background:linear-gradient(135deg, rgba(242,202,80,0.1), rgba(11,21,18,0.9))"><div class="p-4 flex items-center gap-4"><span class="text-4xl">${flag}</span><div class="flex-1"><h3 class="font-bold text-white text-lg">${name}</h3><p class="text-xs text-primary/70">4 regiones · 40 niveles</p><div class="w-full h-2 bg-white/10 rounded-full mt-1 overflow-hidden"><div class="h-full bg-gradient-to-r from-primary to-[#ff9f43] rounded-full transition-all" style="width:${progress}%"></div></div><p class="text-xs text-white/50 mt-1">${progress}% completado</p></div><span class="text-white/30 text-2xl">→</span></div></div>`; }

    function showChileZones() { showCountryZones('chile','🇨🇱 CHILE','UI.showWorldMain()'); }
    function showArgentineZones() { showCountryZones('argentina','🇦🇷 ARGENTINA','UI.showWorldMain()'); }
    function showMexicanZones() { showCountryZones('mexico','🇲🇽 MÉXICO','UI.showWorldMain()'); }

    function showCountryZones(country, title, backFn) {
        const zones = ZONES.filter(z => z.country === country);
        document.getElementById('appRoot').innerHTML = `<div class="h-full flex flex-col bg-surface p-4 overflow-y-auto" style="padding-bottom:70px"><div class="flex items-center gap-4 mb-4"><button onclick="${backFn}" class="material-symbols-outlined text-white">arrow_back</button><span class="text-xl font-bold text-primary">${title}</span></div><div class="grid grid-cols-2 gap-3">${zones.map(z => `<div onclick="UI.showZone('${z.id}')" class="relative rounded-2xl overflow-hidden h-32 border border-white/5" style="background:linear-gradient(135deg, rgba(255,255,255,0.05), transparent)"><div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-3xl">${z.icon}</span><span class="text-white font-bold text-sm">${z.name}</span></div></div>`).join('')}</div></div>`;
        showBannerAd();
    }

    function showAlbum() {
        let html = `<div class="h-full flex flex-col bg-surface p-4 overflow-y-auto" style="padding-bottom:70px"><div class="flex items-center gap-4 mb-6"><button onclick="UI.showWorldMain()" class="material-symbols-outlined text-white">arrow_back</button><span class="text-xl font-bold text-primary">🌎 Álbum de Viajes</span></div>`;
        const countries = [ { flag:'🇨🇱', name:'Chile', zones:['norte','centro','sur','austral'] }, { flag:'🇦🇷', name:'Argentina', zones:['argentina-norte','argentina-centro','argentina-patagonia','argentina-litoral'] }, { flag:'🇲🇽', name:'México', zones:['mexico-norte','mexico-centro','mexico-sur','mexico-caribe'] } ];
        countries.forEach(country => { html += `<div class="mb-4"><h3 class="text-lg font-bold text-white mb-2">${country.flag} ${country.name}</h3><div class="grid grid-cols-4 gap-2">`; country.zones.forEach(zid => { const zone = ZONES.find(z => z.id === zid); if (!zone) return; zone.photos.forEach((photo, idx) => { const levelNum = idx + 1; const stars = getStars(zid, levelNum); const unlocked = stars >= 1; html += `<div class="aspect-square rounded-lg bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden">${unlocked ? `<img src="${photo.url}" class="w-full h-full object-cover" title="${photo.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\'text-white/30 text-xl\'>?</span>'"/>` : `<span class="text-white/30 text-xl">?</span>`}</div>`; }); }); html += '</div></div>'; }); html += '</div>';
        document.getElementById('appRoot').innerHTML = html; showBannerAd();
    }

    function showTienda() { document.getElementById('appRoot').innerHTML = `<div class="h-full flex flex-col bg-surface p-4 overflow-y-auto" style="padding-bottom:70px"><div class="flex items-center gap-4 mb-4"><button onclick="UI.showWorldMain()" class="material-symbols-outlined text-white">arrow_back</button><span class="text-xl font-bold text-primary">🛒 Tienda</span><span class="ml-auto text-sm text-primary/80">💰 ${coins} monedas</span></div><p class="text-xs text-white/50 mb-4">Compra power‑ups para ayudarte en los niveles.</p><div class="space-y-3"><div class="p-4 rounded-xl bg-white/5 border border-white/10 flex justify-between items-center"><div><span class="text-white font-bold">💡 Pista extra</span><p class="text-xs text-white/50">+1 uso</p></div><button onclick="UI.comprarPowerUp('hint')" class="px-4 py-2 rounded-lg bg-primary/20 text-primary text-sm font-bold">10 🪙</button></div><div class="p-4 rounded-xl bg-white/5 border border-white/10 flex justify-between items-center"><div><span class="text-white font-bold">🔀 Mezclar extra</span><p class="text-xs text-white/50">+1 uso</p></div><button onclick="UI.comprarPowerUp('shuffle')" class="px-4 py-2 rounded-lg bg-primary/20 text-primary text-sm font-bold">10 🪙</button></div><div class="p-4 rounded-xl bg-white/5 border border-white/10 flex justify-between items-center"><div><span class="text-white font-bold">↩️ Deshacer extra</span><p class="text-xs text-white/50">+1 uso</p></div><button onclick="UI.comprarPowerUp('undo')" class="px-4 py-2 rounded-lg bg-primary/20 text-primary text-sm font-bold">10 🪙</button></div></div></div>`; showBannerAd(); }
    function comprarPowerUp(tipo) { if (coins < 10) { showMessage('No tienes suficientes monedas'); return; } coins -= 10; localStorage.setItem('coins', coins); GameEngine.addPowerUp(tipo, 1); showTienda(); showMessage('✅ Comprado'); }

    function showSplash() { hideBannerAd(); document.getElementById('appRoot').innerHTML = `<main class="relative h-full w-full flex flex-col items-center justify-center bg-black"><div class="absolute inset-0 z-0" id="collageContainer"><div class="splash-overlay"></div></div><div class="relative z-20 text-center"><span class="font-bold text-sm text-primary/80 uppercase tracking-[0.3em] block mb-4">Outfit</span><h1 class="text-[42px] font-bold text-primary text-glow leading-tight italic">Descubre<br/>América</h1><div class="h-12 w-[1px] bg-gradient-to-b from-primary/60 to-transparent mx-auto my-4"></div><p class="text-sm text-white/50 tracking-widest uppercase">World Tour</p></div><div class="relative z-20 pb-8 text-center animate-pulse mt-8"><p class="text-xs text-primary/60 tracking-widest uppercase">Viaje Meditativo</p></div></main>`; setTimeout(showWorldMain, 4000); }

    return Object.freeze({ showSplash, showWorldMain, showChileZones, showArgentineZones, showMexicanZones, showZone, selectLevel, startGameWithDifficulty, startGame, goBackFromGame, useShuffle, useHint, undoLastSelection, showTienda, showAlbum, showRewardedVideo, closeRewardModal, simulateRewardedVideo, closeVictory, unlockLevelWithVideo, startMemoriceMinigame, closeMemorice, advanceTutorial, prevTutorialStep, skipTutorial, completeTutorial });
})();

UI.showSplash();
</script>
