<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Descubre América · Mahjong World Tour</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2ca50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Mahjong Tour">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0b1512", "background": "#0b1512", "primary": "#f2ca50",
                        "on-background": "#d9e5df", "on-surface": "#d9e5df", "outline": "#99907c",
                        "surface-container-high": "#212c28", "surface-container": "#17221e",
                        "reward": "#4ade80", "jade": "#1a3a2a",
                    },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b1512; font-family: 'Outfit', sans-serif; margin: 0; padding: 0; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; height: 100dvh; }
        .app-container { width: 100%; max-width: 440px; height: 100dvh; max-height: 900px; position: relative; margin: 0 auto; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.9); background: #0b1512; }
        @media (min-width: 440px) { .app-container { border-radius: 24px; height: 95dvh; margin-top: 2.5dvh; } }
        .text-glow { text-shadow: 0 0 20px rgba(242, 202, 80, 0.5); }
        .btn-primary { background: linear-gradient(180deg, #f2ca50 0%, #d4af37 100%); color: #241a00; font-weight: 700; box-shadow: 0 4px 15px rgba(242, 202, 80, 0.3); }
        .btn-reward { background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%); color: #052e16; font-weight: 700; }
        .btn-video { background: linear-gradient(180deg, #c084fc 0%, #a855f7 100%); color: #1a0033; font-weight: 700; }
        .power-up-btn { background: rgba(242,202,80,0.1); border: 1px solid rgba(242,202,80,0.3); color: #f2ca50; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.1em; cursor: pointer; position: relative; }
        .power-up-badge { position: absolute; top: -4px; right: -4px; background: #e74c3c; color: white; font-size: 0.5em; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .vita-tile { position: absolute; border-radius: 10px; cursor: pointer; background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        .vita-tile::before { content: ''; position: absolute; inset: 0; border-radius: 10px; padding: 2px; background: linear-gradient(135deg, #f2ca50, #8B6914, #f2ca50, #d4af37); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; z-index: 5; pointer-events: none; opacity: 0.8; }
        .vita-tile .card-name { position: absolute; bottom: 4px; left: 4px; right: 4px; background: rgba(0,0,0,0.85); color: #f2ca50; font-size: 0.4em; text-align: center; padding: 2px 4px; border-radius: 0 0 6px 6px; z-index: 6; font-weight: 700; }
        .vita-tile.blocked { filter: brightness(0.35); cursor: not-allowed; }
        .vita-tile.free { filter: brightness(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.7), 0 0 20px rgba(242,202,80,0.3); animation: cardFloat 4s ease-in-out infinite; z-index: 10; }
        @keyframes cardFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        .vita-tile.selected-card { animation: selectedGlow 0.6s ease-in-out infinite !important; filter: brightness(1.4) !important; box-shadow: 0 0 40px rgba(242,202,80,0.9) !important; border: 2px solid #f2ca50 !important; z-index: 50 !important; transform: scale(1.06) !important; }
        @keyframes selectedGlow { 0%,100%{box-shadow:0 0 40px rgba(242,202,80,0.9)} 50%{box-shadow:0 0 60px rgba(242,202,80,1)} }
        .slot-item { animation: slotPop 0.4s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border-radius: 8px; overflow: hidden; }
        .slot-empty { background: rgba(255,255,255,0.08); border: 2px dashed rgba(255,255,255,0.4); color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; border-radius: 8px; }
        @keyframes slotPop { 0%{transform:scale(0.4) translateY(-30px);opacity:0} 100%{transform:scale(1);opacity:1} }
        .particle { position: absolute; pointer-events: none; z-index: 100; animation: particleBurst 0.8s ease-out forwards; font-size: 16px; font-weight: bold; color: #f2ca50; }
        @keyframes particleBurst { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
        .zoom-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .zoom-image { width: 80%; max-width: 350px; border-radius: 16px; object-fit: cover; border: 2px solid #f2ca50; }
        .zoom-note { color: white; text-align: center; padding: 1rem; font-size: 0.9rem; max-width: 350px; }
        #ad-banner { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 70; background: rgba(0,0,0,0.8); width: 100%; max-width: 440px; display: flex; justify-content: center; align-items: center; min-height: 50px; }
        .memorice-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 400; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .memorice-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 340px; width: 100%; }
        .memorice-card { aspect-ratio: 4/3; border-radius: 12px; background: #1a3a2a; border: 2px solid rgba(242,202,80,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
        .memorice-card.flipped { border-color: #f2ca50; }
        .memorice-card.matched { border-color: #4ade80; opacity: 0.7; pointer-events: none; }
        .memorice-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: none; }
        .memorice-card.flipped img { display: block; }
        .memorice-card .card-back { font-size: 2em; color: rgba(242,202,80,0.5); }
        .memorice-card.flipped .card-back { display: none; }
        .tutorial-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .tutorial-message { background: rgba(23,34,30,0.95); border: 2px solid #f2ca50; border-radius: 16px; padding: 20px; max-width: 280px; text-align: center; color: white; pointer-events: auto; }
    </style>
</head>
<body>
    <div class="app-container" id="appRoot"></div>
    <div id="ad-banner" style="display:none;"></div>
    <div id="victoryModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;justify-content:center;align-items:center;">
        <div style="background:linear-gradient(145deg,rgba(23,34,30,0.9),rgba(11,21,18,0.95));padding:24px;border-radius:24px;text-align:center;border:1px solid rgba(242,202,80,0.3);max-width:320px;">
            <div style="font-size:4em;" id="victoryIcon">🏆</div>
            <h2 class="text-glow" style="color:#f2ca50;font-size:1.5em;font-weight:bold;">¡Nivel Completado!</h2>
            <p style="color:white;" id="victoryName"></p>
            <div style="font-size:2em;margin:16px 0;" id="starsDisplay"></div>
            <button onclick="UI.closeVictory()" class="btn-primary" style="width:100%;padding:12px;border-radius:12px;font-size:1.1em;">VOLVER</button>
        </div>
    </div>
    <div id="rewardModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:350;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;">
        <div style="width:300px;height:250px;background:rgba(255,255,255,0.05);border-radius:16px;border:2px dashed rgba(74,222,128,0.5);display:flex;align-items:center;justify-content:center;margin-bottom:16px;"><span style="font-size:4em;">🎬</span></div>
        <p style="color:white;" id="rewardText">Mira el video para ganar tu recompensa</p>
        <div style="display:flex;gap:12px;margin-top:12px;">
            <button onclick="UI.closeRewardModal()" style="background:rgba(255,255,255,0.1);color:white;padding:8px 24px;border-radius:12px;">Cancelar</button>
            <button onclick="UI.simulateRewardedVideo()" class="btn-reward" style="padding:8px 24px;border-radius:12px;font-weight:bold;">🎁 Ver Video</button>
        </div>
    </div>
    <script src="juego.js"></script>
    <script src="datos.js"></script>
    <script src="ui.js"></script>
</body>
</html>
